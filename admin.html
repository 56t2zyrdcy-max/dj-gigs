<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Booth — Live Queue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0A1A2B;
    --teal:#123443;
    --coral:#FF6B4A;
    --brass:#C9A15C;
    --foam:#F4F7F6;
    --slate:#7C93A3;
    --green:#8FD9A8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:radial-gradient(ellipse at top, var(--teal) 0%, var(--navy) 60%);
    font-family:'Inter', sans-serif;
    color:var(--foam);
    padding:24px 16px 80px;
  }
  .wrap{ max-width:760px; margin:0 auto; }

  header{
    display:flex; align-items:flex-end; justify-content:space-between;
    flex-wrap:wrap; gap:16px; margin-bottom:22px;
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:3px;
    color:var(--coral); margin:0 0 8px; text-transform:uppercase;
  }
  .eyebrow .dot{
    display:inline-block; width:6px;height:6px; border-radius:50%;
    background:var(--coral); margin-right:6px; animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  h1{
    font-family:'Big Shoulders Display', sans-serif; font-weight:800; font-size:34px;
    letter-spacing:0.5px; margin:0; text-transform:uppercase;
  }

  .stats{ display:flex; gap:10px; }
  .stat{
    background:var(--teal); border:1px solid rgba(201,161,92,0.3); border-radius:12px;
    padding:10px 16px; text-align:center; min-width:84px;
  }
  .stat .num{
    font-family:'Big Shoulders Display', sans-serif; font-weight:800; font-size:24px; color:var(--coral);
  }
  .stat .lbl{ font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:1.5px; color:var(--slate); text-transform:uppercase; }

  .toolbar{
    display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap;
  }
  .filter-btn{
    font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:1px;
    padding:8px 14px; border-radius:20px; border:1px solid rgba(244,247,246,0.2);
    background:transparent; color:var(--foam); cursor:pointer;
  }
  .filter-btn.active{ background:var(--coral); border-color:var(--coral); color:var(--navy); }
  .filter-btn:focus-visible{ outline:2px solid var(--coral); outline-offset:2px; }

  #soundToggle{
    margin-left:auto;
    font-family:'JetBrains Mono', monospace; font-size:12px;
    padding:8px 14px; border-radius:20px; border:1px solid rgba(201,161,92,0.4);
    background:transparent; color:var(--brass); cursor:pointer;
  }

  #queue{ display:flex; flex-direction:column; gap:12px; }

  .req{
    position:relative;
    display:flex; align-items:center; gap:16px;
    background:var(--teal); border-radius:14px; border:1px solid rgba(201,161,92,0.3);
    padding:16px 18px;
    box-shadow:0 12px 24px -18px rgba(0,0,0,0.7);
    animation:slideIn 0.25s ease;
  }
  @keyframes slideIn{ from{ opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);} }
  .req.played{ opacity:0.45; }

  .req-main{ flex:1; min-width:0; }
  .req-song{ font-size:16px; font-weight:600; margin:0 0 4px; word-break:break-word; }
  .req-meta{ font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--slate); }

  .req-tip{
    font-family:'Big Shoulders Display', sans-serif; font-weight:800; font-size:22px;
    padding:2px 12px; border-radius:8px; min-width:56px; text-align:center;
  }
  .req-tip.paid{ color:var(--navy); background:var(--coral); }
  .req-tip.none{ color:var(--slate); border:1px dashed rgba(124,147,163,0.5); background:transparent; }

  .req-actions{ display:flex; gap:6px; }
  .icon-btn{
    width:34px; height:34px; border-radius:9px; border:1px solid rgba(244,247,246,0.2);
    background:transparent; color:var(--foam); cursor:pointer; font-size:15px; line-height:1;
    display:flex; align-items:center; justify-content:center;
  }
  .icon-btn:hover{ border-color:var(--coral); }
  .icon-btn.done{ border-color:var(--green); color:var(--green); }
  .icon-btn:focus-visible{ outline:2px solid var(--coral); outline-offset:2px; }

  .empty{
    text-align:center; padding:60px 20px; color:var(--slate);
  }
  .empty .big{ font-family:'Big Shoulders Display', sans-serif; font-size:28px; color:var(--foam); margin-bottom:6px; text-transform:uppercase; }

  .config-warning{
    background:rgba(255,107,74,0.12);
    border:1px solid rgba(255,107,74,0.4);
    color:var(--foam);
    border-radius:12px;
    padding:12px 14px;
    font-size:12.5px;
    line-height:1.5;
    margin-bottom:18px;
  }
  .config-warning b{ color:var(--coral); }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <p class="eyebrow"><span class="dot"></span>Booth view</p>
      <h1>Live Queue</h1>
    </div>
    <div class="stats">
      <div class="stat"><div class="num" id="statCount">0</div><div class="lbl">Requests</div></div>
      <div class="stat"><div class="num" id="statTips">€0</div><div class="lbl">Tips</div></div>
    </div>
  </header>

  <div id="configWarning" class="config-warning" hidden>
    ⚠️ <b>Setup incomplete:</b> Firebase isn't connected yet, so this panel can't receive live requests. Paste your real firebaseConfig into this file to fix it.
  </div>

  <div class="toolbar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="unplayed">Unplayed</button>
    <button class="filter-btn" data-filter="paid">Tipped</button>
    <button id="soundToggle" type="button">🔊 Sound on</button>
  </div>

  <div id="queue"></div>
  <div class="empty" id="emptyState" hidden>
    <div class="big">No requests yet</div>
    <div>New song requests will appear here the moment a guest sends one.</div>
  </div>
</div>

<!--
  Paste the SAME firebaseConfig you used in guest.html so both pages
  read and write to the same Realtime Database.
-->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBcGSMD9MCmSml8epSDbCnkykyk1wW-w6E",
    authDomain: "djozmen-53d67.firebaseapp.com",
    databaseURL: "https://djozmen-53d67-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "djozmen-53d67",
    storageBucket: "djozmen-53d67.firebasestorage.app",
    messagingSenderId: "1097752024636",
    appId: "1:1097752024636:web:1c022d20fba91a2d6e5539"
  };
  let db = null;
  let firebaseReady = false;
  const isPlaceholder = Object.values(firebaseConfig).some(v => typeof v === 'string' && v.includes('YOUR_'));
  if (!isPlaceholder){
    try{
      firebase.initializeApp(firebaseConfig);
      db = firebase.database();
      firebaseReady = true;
    }catch(e){
      console.error('Firebase init failed:', e);
    }
  } else {
    console.warn('Firebase config still has placeholder values — the queue will stay empty.');
  }
</script>

<script>
(function(){
  const queueEl = document.getElementById('queue');
  const emptyState = document.getElementById('emptyState');
  const statCount = document.getElementById('statCount');
  const statTips = document.getElementById('statTips');
  const soundToggle = document.getElementById('soundToggle');
  const filterButtons = document.querySelectorAll('.filter-btn');

  let requests = {};   // id -> record
  let filter = 'all';
  let soundOn = true;
  let loadedInitial = false;

  // Simple beep using Web Audio API — no external sound file needed.
  function playBeep(){
    if (!soundOn) return;
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.4);
    }catch(e){ console.warn('Beep failed', e); }
  }

  soundToggle.addEventListener('click', () => {
    soundOn = !soundOn;
    soundToggle.textContent = soundOn ? '🔊 Sound on' : '🔇 Sound off';
  });

  filterButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      filterButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

  function timeAgo(ts){
    const diff = Math.max(0, Date.now() - ts);
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    return hrs + 'h ' + (mins % 60) + 'm ago';
  }

  function render(){
    const list = Object.entries(requests)
      .sort((a,b) => b[1].createdAt - a[1].createdAt);

    const filtered = list.filter(([id, r]) => {
      if (filter === 'unplayed') return !r.played;
      if (filter === 'paid') return r.tipStatus === 'paid';
      return true;
    });

    queueEl.innerHTML = '';
    emptyState.hidden = filtered.length > 0;

    filtered.forEach(([id, r]) => {
      const card = document.createElement('div');
      card.className = 'req' + (r.played ? ' played' : '');
      card.innerHTML = `
        <div class="req-tip ${r.tipStatus === 'paid' ? 'paid' : 'none'}">
          ${r.tipStatus === 'paid' ? '€' + r.amount : '—'}
        </div>
        <div class="req-main">
          <p class="req-song">${escapeHtml(r.song)}</p>
          <p class="req-meta">${timeAgo(r.createdAt)}${r.tipStatus === 'paid' ? ' · paid' : ' · no tip'}</p>
        </div>
        <div class="req-actions">
          <button class="icon-btn ${r.played ? 'done' : ''}" data-action="toggle" data-id="${id}" title="${r.played ? 'Mark unplayed' : 'Mark played'}">${r.played ? '✓' : '▶'}</button>
          <button class="icon-btn" data-action="delete" data-id="${id}" title="Remove">✕</button>
        </div>
      `;
      queueEl.appendChild(card);
    });

    // Stats
    const count = list.length;
    const tips = list.reduce((sum, [id, r]) => sum + (r.tipStatus === 'paid' ? Number(r.amount) : 0), 0);
    statCount.textContent = count;
    statTips.textContent = '€' + tips;
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  queueEl.addEventListener('click', (e) => {
    const btn = e.target.closest('.icon-btn');
    if (!btn) return;
    const id = btn.dataset.id;
    if (btn.dataset.action === 'toggle'){
      const current = requests[id];
      db.ref('requests/' + id + '/played').set(!current.played);
    } else if (btn.dataset.action === 'delete'){
      db.ref('requests/' + id).remove();
    }
  });

  if (!firebaseReady || !db){
    document.getElementById('configWarning').hidden = false;
    render();
    return;
  }

  // Live listeners
  const ref = db.ref('requests');

  ref.once('value').then(() => { loadedInitial = true; }).catch(err => console.error('Firebase read error:', err));

  ref.on('child_added', (snap) => {
    requests[snap.key] = snap.val();
    if (loadedInitial) playBeep();
    render();
  });

  ref.on('child_changed', (snap) => {
    requests[snap.key] = snap.val();
    render();
  });

  ref.on('child_removed', (snap) => {
    delete requests[snap.key];
    render();
  });

  render();
})();
</script>

</body>
</html>
